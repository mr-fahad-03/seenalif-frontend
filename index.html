    <!-- GA/Ads are handled via GTM container to avoid duplicate gtag bootstrap -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.grabatoz.ae" />

      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />

    <!-- Defer non-critical third-party scripts to reduce early network/caching penalties -->
    <script>
      ;(function () {
        var loaded = false

        function appendScript(src, id) {
          if (id && document.getElementById(id)) return document.getElementById(id)
          var script = document.createElement("script")
          script.async = true
          script.src = src
          if (id) script.id = id
          document.head.appendChild(script)
          return script
        }

        function loadThirdParty() {
          if (loaded) return
          loaded = true

          // Microsoft Clarity
         
          // Google Customer Reviews Merchant Widget
          var merchantScript = appendScript(
            "https://www.gstatic.com/shopping/merchant/merchantwidget.js",
            "merchantWidgetScript"
          )
          merchantScript.addEventListener("load", function () {
            if (window.merchantwidget && typeof window.merchantwidget.start === "function") {
              window.merchantwidget.start({
                merchant_id: 5694261680,
                position: "RIGHT_BOTTOM",
                region: "AE",
              })
            }
          })
        }

        // Load third-party trackers/widgets only after real user interaction.
        ;["pointerdown", "keydown", "touchstart", "scroll"].forEach(function (eventName) {
          window.addEventListener(eventName, loadThirdParty, { once: true, passive: true })
        })
      })()
    </script>
